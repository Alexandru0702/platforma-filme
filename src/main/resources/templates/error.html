<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head th:replace="~{fragments :: head('Eroare')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill display-1 text-danger mb-3"></i>
                <h3 th:text="${titluEroare ?: 'Eroare'}">Eroare</h3>
                <p class="lead mt-3" th:text="${mesajEroare ?: 'A aparut o eroare neasteptata.'}">
                    A aparut o eroare.
                </p>
                <p class="text-muted small" th:if="${detaliiEroare}" th:text="${detaliiEroare}"></p>
                <div class="mt-4">
                    <a href="javascript:history.back()" class="btn btn-outline-danger me-2">
                        <i class="bi bi-arrow-left"></i> Inapoi
                    </a>
                    <a href="/" class="btn btn-danger">
                        <i class="bi bi-house"></i> Acasa
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
