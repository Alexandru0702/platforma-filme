<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head th:replace="~{fragments :: head(${film.titlu})}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container mt-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <a href="/filme" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left"></i> Filme
            </a>
            <h2 class="mt-1 mb-0" th:text="${film.titlu}"></h2>
            <span class="badge bg-secondary" th:text="${film.categorie}"></span>
        </div>
        <div>
            <a th:href="@{/filme/{id}/editeaza(id=${film.idFilm})}"
               class="btn btn-outline-secondary me-2">
                <i class="bi bi-pencil"></i> Editeaza
            </a>
            <form th:action="@{/filme/{id}/sterge(id=${film.idFilm})}"
                  method="post" class="d-inline"
                  onsubmit="return confirm('Esti sigur ca vrei sa stergi acest film?')">
                <button type="submit" class="btn btn-outline-danger">
                    <i class="bi bi-trash"></i> Sterge
                </button>
            </form>
        </div>
    </div>

    <!-- Rand 1: Info film + Versiuni -->
    <div class="row g-4">
        <!-- Info film -->
        <div class="col-md-4">
            <div class="card p-4">
                <div class="text-center mb-3">
                    <span class="display-4 badge-rating" th:text="${#numbers.formatDecimal(film.rating,1,1)}"></span>
                    <p class="text-muted small mt-1">Rating mediu</p>
                </div>
                <table class="table table-dark table-sm">
                    <tr>
                        <td class="text-muted">An lansare</td>
                        <td th:text="${film.dataLansare != null ? film.dataLansare.year : '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-muted">Durata</td>
                        <td th:text="${film.durata != null ? film.durata + ' min' : '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-muted">Categorie</td>
                        <td th:text="${film.categorie}"></td>
                    </tr>
                </table>
                <p th:text="${film.descriere}" class="text-muted small"></p>
            </div>
        </div>

        <!-- Versiuni disponibile -->
        <div class="col-md-8">
            <div class="card p-4 mb-3">
                <h5><i class="bi bi-collection-play text-danger"></i> Versiuni disponibile</h5>
                <div class="table-responsive">
                    <table class="table table-dark table-sm">
                        <thead>
                        <tr><th>Format</th><th>Rezolutie</th><th>Limba</th><th>Subtitrare</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="v : ${versiuni}">
                            <td><span class="badge bg-primary" th:text="${v.format}"></span></td>
                            <td th:text="${v.rezolutie}"></td>
                            <td th:text="${v.limba}"></td>
                            <td th:text="${v.subtitrare ?: '-'}"></td>
                            <td>
                                <span th:if="${v.activ}" class="badge bg-success">Activ</span>
                                <span th:unless="${v.activ}" class="badge bg-secondary">Inactiv</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(versiuni)}">
                            <td colspan="5" class="text-muted text-center">Nicio versiune disponibila.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Rand 2: Formulare interactiune -->
    <div class="row g-4 mt-1">

        <!-- CARD VOT -->
        <div class="col-md-4">
            <div class="card p-4 h-100">
                <h5 class="mb-3"><i class="bi bi-star-fill text-warning"></i> Adauga Vot</h5>
                <form th:action="@{/filme/{id}/vot(id=${film.idFilm})}" method="post">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Client</label>
                        <select name="idClient" class="form-select form-select-sm" required>
                            <option value="">-- Selecteaza client --</option>
                            <option th:each="c : ${clienti}"
                                    th:value="${c.idClient}"
                                    th:text="${c.prenume + ' ' + c.nume}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Nota (1-10)</label>
                        <input type="number" name="nota" class="form-control form-control-sm"
                               min="1" max="10" required placeholder="Ex: 8">
                    </div>
                    <button type="submit" class="btn btn-warning btn-sm w-100">
                        <i class="bi bi-star"></i> Voteaza
                    </button>
                </form>
            </div>
        </div>

        <!-- CARD VIZUALIZARE -->
        <div class="col-md-4">
            <div class="card p-4 h-100">
                <h5 class="mb-3"><i class="bi bi-play-circle text-success"></i> Inregistreaza Vizualizare</h5>
                <form th:action="@{/filme/{id}/vizualizare(id=${film.idFilm})}" method="post">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Client</label>
                        <select name="idClient" class="form-select form-select-sm" required>
                            <option value="">-- Selecteaza client --</option>
                            <option th:each="c : ${clienti}"
                                    th:value="${c.idClient}"
                                    th:text="${c.prenume + ' ' + c.nume}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Versiune</label>
                        <select name="idVersiune" class="form-select form-select-sm" required>
                            <option value="">-- Selecteaza versiune --</option>
                            <option th:each="v : ${versiuni}"
                                    th:value="${v.idVersiune}"
                                    th:text="${v.format + ' / ' + v.limba + (v.activ ? '' : ' [INACTIV]')}"
                                    th:disabled="${!v.activ}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Durata vizionata (min)</label>
                        <input type="number" name="durata" class="form-control form-control-sm"
                               min="1" th:value="${film.durata}" placeholder="Minute">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Stare</label>
                        <select name="stare" class="form-select form-select-sm">
                            <option value="COMPLETA" selected>Completa</option>
                            <option value="PARTIALA">Partiala</option>
                            <option value="ABANDONATA">Abandonata</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100">
                        <i class="bi bi-play"></i> Inregistreaza
                    </button>
                </form>
            </div>
        </div>

        <!-- CARD COMENTARIU -->
        <div class="col-md-4">
            <div class="card p-4 h-100">
                <h5 class="mb-3"><i class="bi bi-chat-text text-info"></i> Adauga Comentariu</h5>
                <form th:action="@{/filme/{id}/comentariu(id=${film.idFilm})}" method="post">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Client</label>
                        <select name="idClient" class="form-select form-select-sm" required>
                            <option value="">-- Selecteaza client --</option>
                            <option th:each="c : ${clienti}"
                                    th:value="${c.idClient}"
                                    th:text="${c.prenume + ' ' + c.nume}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Comentariu</label>
                        <textarea name="continut" class="form-control form-control-sm"
                                  rows="4" required maxlength="4000"
                                  placeholder="Scrie parerea ta despre acest film..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-info btn-sm w-100">
                        <i class="bi bi-send"></i> Trimite comentariu
                    </button>
                </form>
            </div>
        </div>

    </div>


</div>

<div th:replace="~{fragments :: footer}"></div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
