<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ro">
<head th:replace="~{fragments :: head(${modEdit} ? 'Editeaza Client' : 'Client Nou')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="page-header">
                <a href="/clienti" class="text-muted text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Clienti
                </a>
                <h3 class="mt-1" th:text="${modEdit} ? 'Editeaza Client' : 'Client Nou'"></h3>
            </div>
            <div class="card p-4">
                <form th:action="${modEdit} ? @{/clienti/{id}/editeaza(id=${client.idClient})} : @{/clienti/nou}"
                      method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prenume *</label>
                            <input type="text" name="prenume" class="form-control"
                                   th:value="${client.prenume}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nume *</label>
                            <input type="text" name="nume" class="form-control"
                                   th:value="${client.nume}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefon acasa *</label>
                        <input type="text" name="telefonAcasa" class="form-control"
                               th:value="${client.telefonAcasa}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefon mobil</label>
                        <input type="text" name="telefonMobil" class="form-control"
                               th:value="${client.telefonMobil}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                               th:value="${client.email}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adresa</label>
                        <input type="text" name="adresa" class="form-control"
                               th:value="${client.adresa}">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Oras</label>
                        <input type="text" name="oras" class="form-control"
                               th:value="${client.oras}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-save"></i>
                            <span th:text="${modEdit} ? 'Salveaza' : 'Inregistreaza client'"></span>
                        </button>
                        <a href="/clienti" class="btn btn-outline-secondary">Anuleaza</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
