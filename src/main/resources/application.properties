spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=movie_db
spring.datasource.password=movie_db123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Dezactiveaza initializarea automata a schemei de catre Spring
spring.sql.init.mode=never

# Configurare HikariCP pentru Oracle 11g
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
spring.datasource.hikari.maximum-pool-size=5

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

server.port=8081

spring.mvc.hiddenmethod.filter.enabled=true

logging.level.root=INFO
logging.level.ro.platformafilme=DEBUG